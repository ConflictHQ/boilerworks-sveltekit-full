services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    container_name: boilerworks-sveltekit
    ports:
      - "5173:5173"
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
    environment:
      - DATABASE_URL=postgres://boilerworks:boilerworks@db:5432/boilerworks_development
      - SESSION_SECRET=docker-dev-session-secret-change-in-production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5173/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: boilerworks-sveltekit-db
    ports:
      - "5448:5432"
    environment:
      - POSTGRES_USER=boilerworks
      - POSTGRES_PASSWORD=boilerworks
      - POSTGRES_DB=boilerworks_development
    volumes:
      - sveltekit_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boilerworks -d boilerworks_development"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  sveltekit_db:
  node_modules:
